name: CI
on:
 push:
   branches: [ master ]
 pull_request:
   branches: [ master ]

jobs:
 conviso-ast:
   runs-on: ubuntu-latest
   container:
     image: convisoappsec/convisoast
     env:
       CONVISO_API_KEY:  ${{secrets.CONVISO_API_KEY}}
       CONVISO_COMPANY_ID: 843
   steps:
   - uses: actions/checkout@v6

   - name: Run AST
     run: conviso ast run --vulnerability-auto-close
